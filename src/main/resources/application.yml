server:
  port: 8081
spring:
  application:
    name: product-service
  datasource:
      url: jdbc:mysql://localhost:3307/product_db
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:1234}
      driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
